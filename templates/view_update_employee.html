{% extends "base.html" %}

{% block content %}
<h5 class="text-center">Employee Management-View Employees</h5>

<table class="table table-bordered mt-3">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    </tbody>

    <tbody>
        {% for e in employees %}
        <tr>
            <td>{{ e.id }}</td>
            <td>{{ e.name }}</td>
            <td>{{ e.age }}</td>
            <td>{{ e.phone }}</td>
            <td>{{ e.address }}</td>
            <td>{{ e.department }}</td>
            <td>
                <a href="/edit_employee/{{ e.id }}" class="btn btn-warning btn-sm">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
