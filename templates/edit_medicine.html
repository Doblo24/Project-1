{% extends "base.html" %}

{% block content %}

<h3 class="text-center">Edit Medicine</h3>

<form method="POST">

    <div class="mb-2">
        <label>Medicine Name</label>
        <input type="text" name="name" value="{{ medicine.name }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Qantity</label>
        <input type="number" name="quantity" value="{{ medicine.quantity }}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Price</label>
        <input type="number" name="price" value="{{ medicine.price }}" class="form-control">
    </div>



    <button type="submit" class="btn btn-primary">Update</button>

</form>

{% endblock %}
